name: NK AI Market Brief

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "preview, send, or auto"
        required: false
        default: "preview"
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 8,9 * * *"
    - cron: "17 10,11,12 * * *"

concurrency:
  group: nk-ai-market-brief-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  newsletter:
    runs-on: ubuntu-latest
    env:
      NEWSLETTER_SEND_ENABLED: "false"
      NEWSLETTER_TIMEZONE: America/New_York
      NEWSLETTER_TARGET_HOUR_LOCAL: "4"
      NEWSLETTER_REVIEW_LOOKBACK_HOURS: "168"
      NEWSLETTER_LIVE_RUN_JSON_URL: https://osangen.github.io/nk-ai-market-brief-review/run.json
      RUN_MODE: ${{ github.event.inputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Decide scheduled refresh
        id: refresh_gate
        run: npm run should:refresh

      - run: npm ci
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' }}

      - run: npm test
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' }}

      - name: Build newsletter page
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' }}
        run: |
          MODE="${RUN_MODE:-auto}"
          if [ "$MODE" = "send" ]; then
            npm run send
          elif [ "$MODE" = "auto" ]; then
            npm run daily
          else
            npm run build
          fi

      - name: Check deploy output
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' }}
        run: |
          MODE="${RUN_MODE:-auto}"
          if [ "$MODE" = "auto" ]; then
            NEWSLETTER_EXPECT_MODE=auto NEWSLETTER_MAX_ACTIVE_LOOKBACK_HOURS=84 NEWSLETTER_EXPECT_FRESH_DATE=true npm run check:deploy
          else
            npm run check:deploy
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' }}
        with:
          name: nk-ai-market-brief
          path: |
            .newsletter-outbox
            site

      - name: Configure Pages
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' && vars.DEPLOY_GITHUB_PAGES == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' && vars.DEPLOY_GITHUB_PAGES == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' && vars.DEPLOY_GITHUB_PAGES == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live page freshness
        if: ${{ steps.refresh_gate.outputs.should_run == 'true' && vars.DEPLOY_GITHUB_PAGES == 'true' && (github.event_name == 'schedule' || github.event.inputs.mode == 'auto') }}
        run: npm run check:live
